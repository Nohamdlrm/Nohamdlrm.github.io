<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Signal Perdu</title>
    <style>
        :root {
            --bg: #030303;
            --accent: #6366f1;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Le halo lumineux en fond */
        .aura {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0,0,0,0) 70%);
            filter: blur(80px);
            z-index: 0;
            animation: move 10s infinite alternate;
        }

        .card {
            z-index: 1;
            backdrop-filter: blur(20px);
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4rem;
            border-radius: 40px;
            text-align: center;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            padding: 8px 16px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .dot {
            width: 8px; height: 8px;
            background: #4ade80;
            border-radius: 50%;
            box-shadow: 0 0 10px #4ade80;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            font-weight: 800;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 40%, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #a1a1aa;
            font-size: 1.1rem;
            line-height: 1.6;
            margin: 1.5rem 0 2.5rem;
        }

        .btn {
            background: #fff;
            color: #000;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }
    </style>
</head>
<body>
    <div class="aura"></div>
    <div class="card">
        <div class="status">
            <div class="dot"></div> Domaine Actif
        </div>
        <h1>Liaison rompue.</h1>
        <p>Le nom de domaine est bien configuré, mais l'hébergement refuse la connexion. C'est sûrement une maintenance ou une erreur de configuration serveur.</p>
        <a href="javascript:location.reload()" class="btn">Actualiser la session</a>
    </div>
</body>
</html>
