<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Campus Rosa Parks</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Police Quicksand -->
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
--rose: #ff7ab6;
--bleu: #4facfe;
--violet: #7f5af0;
--glass: rgba(255, 255, 255, 0.14);
}

* {
margin: 0;
padding: 0;
box-sizing: border-box;
font-family: 'Quicksand', sans-serif;
}

body {
min-height: 100vh;
background: linear-gradient(135deg, var(--violet), #1b1d4f);
display: flex;
align-items: center;
justify-content: center;
color: #fff;
overflow: hidden;
}

/* Bulles lumineuses */
.bg {
position: absolute;
width: 400px;
height: 400px;
border-radius: 50%;
filter: blur(150px);
opacity: 0.6;
animation: float 10s ease-in-out infinite alternate;
}

.bg.one {
background: var(--rose);
top: -150px;
left: -150px;
}

.bg.two {
background: var(--bleu);
bottom: -150px;
right: -150px;
animation-delay: 3s;
}

@keyframes float {
from { transform: translateY(0); }
to { transform: translateY(60px); }
}

/* Carte principale */
.card {
position: relative;
z-index: 2;
background: var(--glass);
backdrop-filter: blur(24px);
border-radius: 30px;
padding: 3.5rem 3rem;
width: 92%;
max-width: 560px;
text-align: center;
box-shadow: 0 40px 80px rgba(0,0,0,0.35);
animation: appear 1.2s ease forwards;
}

@keyframes appear {
from {
opacity: 0;
transform: translateY(40px);
}
to {
opacity: 1;
transform: translateY(0);
}
}

.campus {
font-size: 0.85rem;
letter-spacing: 3px;
text-transform: uppercase;
opacity: 0.85;
margin-bottom: 1.3rem;
}

h1 {
font-size: 2.4rem;
font-weight: 700;
margin-bottom: 1.2rem;
}

.text {
font-size: 1.05rem;
line-height: 1.7;
opacity: 0.9;
margin-bottom: 2.4rem;
}

/* Loader 3 points */
.loader {
display: flex;
justify-content: center;
gap: 14px;
margin-bottom: 2.2rem;
}

.loader span {
width: 9px;
height: 9px;
border-radius: 50%;
background: white;
animation: pulse 1.4s infinite ease-in-out;
}

.loader span:nth-child(2) { animation-delay: 0.2s; }
.loader span:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse {
0%, 80%, 100% { transform: scale(0); }
40% { transform: scale(1); }
}

.date {
font-size: 0.95rem;
font-weight: 600;
letter-spacing: 0.4px;
}

.date span {
color: var(--rose);
}

@media (max-width: 480px) {
h1 {
font-size: 2rem;
}
.card {
padding: 3rem 2rem;
}
}
</style>
</head>
<body>

<div class="bg one"></div>
<div class="bg two"></div>

<div class="card">
<div class="campus">Campus Rosa Parks</div>

<h1>Maintenance en cours</h1>

<div class="text">
Notre site est momentanément indisponible afin
d’améliorer votre expérience numérique.
<br>
Merci pour votre patience 🤍
</div>

<div class="loader">
<span></span>
<span></span>
<span></span>
</div>

<div class="date">
Retour prévu le <span>31 janvier 2026</span> à <span>17h30</span>
</div>
</div>

</body>
</html>
