<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>FATAL ERROR - RAID INITIATED</title>
    <style>
        :root {
            --danger: #ff0000;
            --dark: #050000;
        }

        body {
            background-color: var(--dark);
            color: var(--danger);
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            border: 1px solid var(--danger);
            background: rgba(255, 0, 0, 0.05);
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2);
            position: relative;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 10px;
            animation: glitch 0.2s infinite;
        }

        .warning {
            font-size: 1.5rem;
            margin-top: 20px;
            font-weight: bold;
            border-bottom: 2px solid var(--danger);
            display: inline-block;
            padding-bottom: 5px;
        }

        .discord-link {
            color: white;
            background: var(--danger);
            padding: 10px 20px;
            display: block;
            margin-top: 30px;
            text-decoration: none;
            font-weight: 900;
            animation: pulse 1s infinite;
        }

        /* Animations */
        @keyframes glitch {
            0% { transform: translate(0); text-shadow: 2px 2px #fff; }
            20% { transform: translate(-3px, 3px); text-shadow: -2px -2px #000; }
            40% { transform: translate(3px, -3px); }
            60% { transform: translate(-3px, -3px); }
            80% { transform: translate(3px, 3px); }
            100% { transform: translate(0); }
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0px var(--danger); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px var(--danger); }
            100% { transform: scale(1); box-shadow: 0 0 0px var(--danger); }
        }

        /* Overlay de "bruit" visuel */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUicGLeE/giphy.gif');
            opacity: 0.03;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="noise"></div>

    <div class="container">
        <h1>JE VOUS AI AKERD</h1>
        
        <p class="warning">ATTENTION : RAID IMMINENT</p>
        
        <p style="color: #ccc; margin-top: 20px;">
            Un bot de destruction va rejoindre votre serveur.<br>
            Préparez-vous au chaos total.
        </p>

        <a href="https://discord.gg/rosaparks" class="discord-link">
            DISCORD.GG/ROSAPARKS
        </a>

        <p style="font-size: 0.7rem; margin-top: 30px; opacity: 0.5;">
            STATUS: INJECTING EXPLOIT... 99%
        </p>
    </div>

</body>
</html>
